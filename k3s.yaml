# Platform Agent - K3s (SurrealDB in ConfigMap)
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: platform-agent
  name: platform-agent
data:
  # SurrealDB (external)
  SURREALDB_URL: "wss://surrealdb.example.com/rpc"
  SURREALDB_USER: "root"
  SURREALDB_PASS: "change-me"
  SURREALDB_NS: "nospace"
  SURREALDB_DB: "platform"
  
  # LLM
  LLM_PROVIDER: "ollama"
  LLM_MODEL: "llama3"
  LLM_BASE_URL: "http://localhost:11434"
---
apiVersion: v1
kind: Service
metadata:
  namespace: platform-agent
  name: platform-agent
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: platform-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: platform-agent
  name: platform-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-agent
  template:
    metadata:
      labels:
        app: platform-agent
    spec:
      containers:
        - name: platform-agent
          image: ghcr.io/openautonomyx/platform-agent:latest
          envFrom:
            - configMapRef:
                name: platform-agent
          ports:
            - containerPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: platform-agent
  name: platform-agent
spec:
  rules:
    - host: platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-agent
                port:
                  number: 8080