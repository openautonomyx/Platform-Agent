# Platform Agent - K3s
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-agent
data:
  SURREALDB_URL: "wss://surrealdb.example.com"
  LLM_PROVIDER: "ollama"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-agent
  template:
    metadata:
      labels:
        app: platform-agent
    spec:
      containers:
        - name: platform-agent
          image: ghcr.io/openautonomyx/platform-agent:latest
          envFrom:
            - configMapRef:
                name: platform-agent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: platform-agent
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: platform-agent
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-agent
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-agent
                port:
                  number: 80