# Platform Agent - Stacker Build
# 
# Build: stacker build -f platform-agent.stacker
# Publish: stacker publish

name: platform-agent
description: Platform Agent with SurrealDB backend

# =============================================================================
# Build
# =============================================================================

build:
  from: docker://python:3.12-slim
  build_only: true
  import: 
    - ./src
    - ./pyproject.toml
  run: |
    pip install --no-cache-dir surrealdb aiohttp pydantic uvicorn fastapi
    pip install -e /stacker/.

# =============================================================================
# API Service
# =============================================================================

api:
  from: docker://python:3.12-slim
  import: stacker://build
  run: |
    WORKDIR /app
    EXPORT 3000
    CMD ["uvicorn", "platform_agent.server:app", "--host", "0.0.0.0"]

# =============================================================================
# UI Build & Runtime
# =============================================================================

build-ui:
  from: docker://node:20-slim
  build_only: true
  import: ./ui
  run: |
    cd /stacker/ui && npm install && npm run build

ui:
  from: docker://nginx:alpine
  import: stacker://build-ui/dist
  run: |
    cp -r /stacker/dist/* /usr/share/nginx/html/
    EXPORT 4321
    CMD ["nginx", "-g", "daemon off;"]