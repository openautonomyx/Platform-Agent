# Platform Agent - K3s Deployment

# =============================================================================
# Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: platform-agent

---
# =============================================================================
# ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-agent
  namespace: platform-agent
data:
  SURREALDB_URL: "ws://surrealdb:8000/rpc"
  SURREALDB_NAMESPACE: "platform"
  SURREALDB_DATABASE: "agent"
  OLLAMA_URL: "http://ollama:11434"
  LLM_PROVIDER: "ollama"

---
# =============================================================================
# Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: platform-agent
  namespace: platform-agent
type: Opaque
stringData:
  SURREALDB_USER: "root"
  SURREALDB_PASS: "root"

---
# =============================================================================
# SurrealDB Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: platform-agent
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: surrealdb

---
# SurrealDB Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrealdb
  namespace: platform-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:latest
          args: ["start", "--user", "root", "--pass-root"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: platform-agent

---
# =============================================================================
# Ollama Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: platform-agent
spec:
  ports:
    - port: 11434
      targetPort: 11434
  selector:
    app: ollama

---
# Ollama Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: platform-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              memory: "4Gi"
              nvidia.com/gpu: 1
            limits:
              memory: "8Gi"
              nvidia.com/gpu: 1

---
# =============================================================================
# API Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: platform-agent
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: api

---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: platform-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: platform-agent/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: platform-agent
          env:
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: platform-agent
                  key: SURREALDB_USER
            - name: SURREALDB_PASS
              valueFrom:
                secretKeyRef:
                  name: platform-agent
                  key: SURREALDB_PASS
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
# =============================================================================
# UI Service (NodePort for.local access)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: platform-agent
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: ui

---
# UI Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: platform-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: platform-agent/ui:latest
          ports:
            - containerPort: 80

---
# =============================================================================
# Ingress
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-agent
  namespace: platform-agent
spec:
  rules:
    - host: platform.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 80