# Platform Agent - K3s Light (single file, minimal)

# =============================================================================
# Quick Deploy (K3s/Traefik built-in)
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platforment
  namespace: platform
data:
  OLLAMA_URL: "http://ollama:11434"
  LLM_PROVIDER: "ollama"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-agent
  namespace: platform
type: Opaque
stringData:
  SURREALDB_USER: "root"
  SURREALDB_PASS: "root"
---
# SurrealDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrealdb
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:latest
          args: ["start", "--user", "root"]
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: platform
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: surrealdb
---
# Ollama (GPU recommended)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            limits:
              nvidia.com/gpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: platform
spec:
  ports:
    - port: 11434
      targetPort: 11434
  selector:
    app: ollama
---
# API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: platform-agent/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: platform-agent
            - secretRef:
                name: platform-agent
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: platform
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: api
---
# UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: platform-agent/ui:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: platform
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: ui