# Platform Agent - K3s

apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-agent
  namespace: platform
type: Opaque
stringData:
  SURREALDB_USER: "root"
  SURREALDB_PASS: "root"
  # For OpenAI/Anthropic/etc
  LLM_API_KEY: ""
---
# SurrealDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrealdb
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:latest
          args: ["start", "--user", "root"]
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: platform
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: surrealdb
---
# llama.cpp / llama-server (CPU)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-server
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-server
  template:
    metadata:
      labels:
        app: llama-server
    spec:
      containers:
        - name: llama-server
          image: ghcr.io/ggerganov/llama.cpp:server
          ports:
            - containerPort: 8080
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
---
apiVersion: v1
kind: Service
metadata:
  name: llama-server
  namespace: platform
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: llama-server
---
# API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: platform-agent/api:latest
          ports:
            - containerPort: 3000
          env:
            - name: SURREALDB_URL
              value: "ws://surrealdb:8000/rpc"
            - name: LLM_PROVIDER
              value: "llama-server"
            - name: LLM_BASE_URL
              value: "http://llama-server:8080"
          envFrom:
            - secretRef:
                name: platform-agent
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: platform
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: api
---
# UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: platform-agent/ui:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: platform
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: ui