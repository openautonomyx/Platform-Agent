# Platform Agent - Docker Compose

services:
  # SurrealDB (database)
  surrealdb:
    image: surrealdb/surrealdb:latest
    ports:
      - "8000:8000"
    environment:
      - SURREALDB_USER=root
      - SURREALDB_PASS=root
    command: start --user root --pass-root
    volumes:
      - surreal_data:/var/lib/surrealdb

  # Ollama (local LLM)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  # Platform Agent API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SURREALDB_URL=ws://surrealdb:8000/rpc
      - SURREALDB_USER=root
      - SURREALDB_PASS=root
      - OLLAMA_URL=http://ollama:11434
      - LLM_PROVIDER=ollama
    depends_on:
      - surrealdb
      - ollama

  # Frontend UI
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    environment:
      - PUBLIC_API_URL=http://api:3000

volumes:
  surreal_data:
  ollama_data: